# aiarch PHASE workflow (App-A service lifecycle — distinct prompt per phase)
# ===========================================================================
# Dispatched by archistrator-server constructionPipelineAccess once PER PHASE of an
# activity's Appendix-A life cycle. The constructionManager's phase-walk sets the
# `phase` input; exactly ONE of the per-phase claude-code-action steps below runs
# (each has its OWN tailored prompt — an SRS author and a code implementer need very
# different instructions). All phases share the checkout + contract-extraction setup.
#
# LOAD-BEARING CONTRACT (same anchors as aiarch-construct.yml):
#   1. workflow_dispatch input `idempotency_token` (required) — RA dedup token.
#   2. run-name: aiarch-cp-${{ inputs.idempotency_token }}.
#   3. workflow_dispatch-triggerable on main.
name: aiarch-phase

run-name: aiarch-cp-${{ inputs.idempotency_token }}

on:
  workflow_dispatch:
    inputs:
      idempotency_token:
        description: "aiarch dedup token (RA-supplied; stamped into run-name)"
        required: true
        type: string
      activity_id:
        description: "construction activity id (e.g. C-BG)"
        required: true
        type: string
      component_id:
        description: "component id — a key in .aiarch/state/project.json .serviceContracts"
        required: true
        type: string
      phase:
        description: "App-A phase: requirements | detailedDesign | testPlan | construction | integration"
        required: true
        type: string
      role:
        description: "worker | reviewer"
        required: false
        default: worker
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: aiarch-cp-${{ inputs.idempotency_token }}
  cancel-in-progress: false

env:
  BRANCH: aiarch/construct/${{ inputs.activity_id }}

jobs:
  phase:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Extract service contract from project.json
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          jq --arg c "${{ inputs.component_id }}" '.serviceContracts[$c] // empty' \
            .aiarch/state/project.json > service-contract.json
          test -s service-contract.json || { echo "::error::no contract for ${{ inputs.component_id }}"; exit 1; }
          cat service-contract.json

      # ---------------------------------------------------------------------
      # Phase 1 — REQUIREMENTS: write the Service Requirement Spec (SRS).
      # ---------------------------------------------------------------------
      - name: Requirements (SRS)
        if: ${{ inputs.phase == 'requirements' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            App-A REQUIREMENTS phase for archistrator component "${{ inputs.component_id }}"
            (activity ${{ inputs.activity_id }}). Read service-contract.json (repo root).

            Write a concise Service Requirement Spec (SRS) to
            docs/srs/${{ inputs.component_id }}.md — a few paragraphs: what the service
            MUST do, its operations (from the contract Ops), its encapsulated volatility,
            its inbound/outbound dependencies, and its error model. No code. Derive it
            faithfully from the contract; this is the "what", not the "how".

            Then: commit to branch ${{ env.BRANCH }} (create if absent); open a PR titled
            "construct(${{ inputs.activity_id }}): ${{ inputs.component_id }}" if none exists,
            else push to it. Stop. Do not merge. 12-min budget.

      # ---------------------------------------------------------------------
      # Phase 2 — DETAILED DESIGN: the Go interfaces, types, and skeleton.
      # ---------------------------------------------------------------------
      - name: Detailed Design (interfaces + types)
        if: ${{ inputs.phase == 'detailedDesign' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            App-A DETAILED DESIGN phase for "${{ inputs.component_id }}". Read
            service-contract.json and docs/srs/${{ inputs.component_id }}.md (from the
            Requirements phase, already on branch ${{ env.BRANCH }}). Follow
            .claude/skills/the-method-layers/ and .claude/skills/the-method-service-contract/.

            Design ONLY the surface: the Go port interface, the message/data contracts,
            and the internal type declarations for the component under
            server/internal/<layer>/<pkg>/ — a skeleton that COMPILES (method bodies may
            return zero values / a not-implemented error). No real behavior yet. Match the
            layer conventions of existing code (engine / manager / resourceaccess / client).

            Verify: gofmt -w . && GOWORK=off go build ./... (working-directory: server).
            Commit to ${{ env.BRANCH }}, push to the PR. Stop. 12-min budget.

      # ---------------------------------------------------------------------
      # Phase 3 — TEST PLAN: table-driven test stubs (ways it does NOT work).
      # ---------------------------------------------------------------------
      - name: Test Plan (failing/skipped tests)
        if: ${{ inputs.phase == 'testPlan' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            App-A TEST PLAN phase for "${{ inputs.component_id }}". The interfaces + types
            from Detailed Design are on branch ${{ env.BRANCH }}. Read service-contract.json.

            Write the service test plan as TABLE-DRIVEN Go tests in the package's _test.go
            — enumerate the ways you will later show the component does NOT work (every op's
            pre-conditions, error paths, idempotency, boundary cases from the contract). The
            cases for not-yet-implemented behavior should t.Skip("pending construction") so
            the package BUILDS and tests run green now. This is the binary exit criterion the
            Construction phase will satisfy.

            Verify: gofmt -w . && GOWORK=off go build ./... && GOWORK=off go test ./internal/<layer>/<pkg>/...
            Commit to ${{ env.BRANCH }}, push to the PR. Stop. 12-min budget.

      # ---------------------------------------------------------------------
      # Phase 4 — CONSTRUCTION: implement the component (default for empty phase).
      # ---------------------------------------------------------------------
      - name: Construction (implement)
        if: ${{ inputs.phase == 'construction' || inputs.phase == '' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            App-A CONSTRUCTION phase for "${{ inputs.component_id }}". The interfaces, types,
            and test plan from prior phases are on branch ${{ env.BRANCH }} (if this is a
            standalone dispatch they may be absent — implement from service-contract.json
            directly). Follow .claude/skills/the-method-layers/ and the junior-developer agent.

            Implement the component to SATISFY its contract: fill in the method bodies, remove
            the t.Skip from the test-plan cases your implementation now satisfies, and make the
            package build, vet clean, and its own tests pass. Match existing layer conventions.
            Do NOT edit */generated/.

            Verify (working-directory: server): gofmt -w . && GOWORK=off go build ./... &&
            GOWORK=off go vet ./... && GOWORK=off go test ./internal/<layer>/<pkg>/...
            Do NOT run `make test-short` (containers; too slow). Commit to ${{ env.BRANCH }};
            open the PR "construct(${{ inputs.activity_id }}): ${{ inputs.component_id }}" if
            none exists, else push to it. Stop. Do not merge. 12-min budget.

      # ---------------------------------------------------------------------
      # Phase 5 — INTEGRATION: wire the component into its consumers.
      # ---------------------------------------------------------------------
      - name: Integration (wire into consumers)
        if: ${{ inputs.phase == 'integration' }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            App-A INTEGRATION phase for "${{ inputs.component_id }}". The implemented
            component is on branch ${{ env.BRANCH }}. Read service-contract.json for its
            inbound consumers / outbound dependencies.

            Wire the component into its consumers: construct it in the composition root
            (server/cmd/server/main.go) and adapt it to any consumer seams (the "accept
            interfaces" adapters), per .claude/skills/the-method-layers/. Make the whole
            server build and vet cleanly with the component integrated. Do NOT edit
            */generated/.

            Verify (working-directory: server): gofmt -w . && GOWORK=off go build ./... &&
            GOWORK=off go vet ./... Commit to ${{ env.BRANCH }}, push to the PR. Stop.
            Do not merge. 12-min budget.
