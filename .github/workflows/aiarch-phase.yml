# aiarch PHASE workflow (App-A service lifecycle)
# ================================================
# Dispatched by archistrator-server constructionPipelineAccess once PER PHASE of an
# activity's Appendix-A life cycle (Requirements → Detailed Design → Test Plan →
# Construction → Integration), with a worker or reviewer role. This is the per-step
# generalisation of aiarch-construct.yml (which does the whole Construction phase in
# one shot). The constructionManager's phase-walk dispatches this with phase + role
# set; the prompt below adapts to the named phase.
#
# LOAD-BEARING CONTRACT (same anchors as aiarch-construct.yml):
#   1. workflow_dispatch input `idempotency_token` (string, required) — the RA's
#      dedup token, stamped LAST and into run-name.
#   2. run-name: aiarch-cp-${{ inputs.idempotency_token }}  (RunNamePrefix anchor).
#   3. workflow_dispatch-triggerable on main.
name: aiarch-phase

run-name: aiarch-cp-${{ inputs.idempotency_token }}

on:
  workflow_dispatch:
    inputs:
      idempotency_token:
        description: "aiarch dedup token (RA-supplied; stamped into run-name)"
        required: true
        type: string
      activity_id:
        description: "construction activity id (e.g. C-BG)"
        required: true
        type: string
      component_id:
        description: "component id — a key in .aiarch/state/project.json .serviceContracts"
        required: true
        type: string
      phase:
        description: "App-A phase: requirements | detailedDesign | testPlan | construction | integration"
        required: true
        type: string
      role:
        description: "worker | reviewer"
        required: false
        default: worker
        type: string

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: aiarch-cp-${{ inputs.idempotency_token }}
  cancel-in-progress: false

jobs:
  phase:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Extract service contract from project.json
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          jq --arg c "${{ inputs.component_id }}" '.serviceContracts[$c] // empty' \
            .aiarch/state/project.json > service-contract.json
          if [ ! -s service-contract.json ]; then
            echo "::error::no service contract for component '${{ inputs.component_id }}' in .aiarch/state/project.json"
            exit 1
          fi
          cat service-contract.json

      - name: Run phase (claude-code-action)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: archistrator-bot
          show_full_output: true
          claude_args: "--dangerously-skip-permissions"
          prompt: |
            You are executing ONE phase of The Method's Appendix-A service development
            life cycle for the archistrator server component "${{ inputs.component_id }}"
            (activity ${{ inputs.activity_id }}), in the role: ${{ inputs.role }}.

            The service contract (JSON) is at the repo root: service-contract.json
            Method conventions: .claude/skills/the-method-layers/,
            .claude/skills/the-method-service-contract/, .claude/agents/junior-developer.md
            Existing layer code to learn from: server/internal/

            ## Phase to execute: "${{ inputs.phase }}"

            App-A phases (do ONLY the named one; earlier phases' artifacts are already
            on the branch aiarch/construct/${{ inputs.activity_id }} from prior phases):

            - requirements   → write a brief Service Requirement Spec (SRS) for this
                               component to docs/srs/${{ inputs.component_id }}.md
                               (a few paragraphs: what the service must do, from the contract).
            - detailedDesign → design the component's Go interfaces, message/data
                               contracts and internal types (no behavior yet); a skeleton
                               package under server/internal/<layer>/<pkg>/ that compiles.
            - testPlan       → write the service test plan as table-driven Go test stubs
                               (the ways you'll later show it does NOT work) in the package's
                               _test.go, building but t.Skip-ing the unimplemented cases.
            - construction   → implement the component to satisfy the contract; make the
                               package build, vet clean, and its own tests pass.
            - integration    → wire the component into its consumers (composition root /
                               adjacent layers) and make the integration compile.

            ## Rules

            1. Read service-contract.json first. Do EXACTLY the "${{ inputs.phase }}" phase
               — no more, no less. Match the conventions of existing code in the same layer.
            2. Do NOT edit any file under */generated/.
            3. Verify YOUR phase output (working-directory: server) — fast checks only:
                 gofmt -w . && GOWORK=off go build ./... && GOWORK=off go vet ./...
                 (construction/testPlan also: GOWORK=off go test ./internal/<layer>/<pkg>/...)
               Do NOT run `make test-short` (containers; too slow). 12-min hard budget.
            4. Commit all changes onto branch aiarch/construct/${{ inputs.activity_id }}
               (create it if absent; otherwise add to it).
            5. Open the PR if not already open:
                 Title: "construct(${{ inputs.activity_id }}): ${{ inputs.component_id }}"
               then STOP. Do not merge. If a PR already exists for the branch, just push
               this phase's commit to it.

            ## If role == reviewer
            Instead of producing the phase artifact, REVIEW the "${{ inputs.phase }}" phase
            output on the PR for activity ${{ inputs.activity_id }} against the contract and
            the Method conventions. Post review comments and set the run conclusion to
            SUCCESS only if the phase passes its binary exit criterion (App-A: a failing
            review repeats the preceding task); FAIL the step (exit 1) if it does not.
