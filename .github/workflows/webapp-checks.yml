name: WebApp Checks

on:
  push:
    branches: [main]
    paths:
      - 'webApp/**'
      - 'server/api/openapi.yaml'
      - '.github/workflows/webapp-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'webApp/**'
      - 'server/api/openapi.yaml'
      - '.github/workflows/webapp-checks.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    defaults:
      run:
        working-directory: webApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Configure GitHub Packages registry for private npm package
        run: |
          echo "@davidmarne:registry=https://npm.pkg.github.com" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=${{ secrets.PLATFORM_READ_TOKEN }}" >> .npmrc

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
