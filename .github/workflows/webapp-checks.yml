name: WebApp Checks

on:
  push:
    branches: [main]
    paths:
      - 'webApp/**'
      - 'server/api/openapi.yaml'
      - '.github/workflows/webapp-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'webApp/**'
      - 'server/api/openapi.yaml'
      - '.github/workflows/webapp-checks.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read

    defaults:
      run:
        working-directory: webApp

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: webApp/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        # NON-BLOCKING: 23 pre-existing lint errors carried over from the monorepo webApp
        # (void types, missing return types, jsx-sort-props, defensive always-truthy guards).
        # Surfaced here but not gating the extraction CI; burn down separately.
        continue-on-error: true
        run: npm run lint
