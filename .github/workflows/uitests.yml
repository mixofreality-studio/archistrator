name: UI Tests

# Runs when server code, webApp, the uitest suite itself, or this workflow file
# changes. Provisions Postgres + Temporal, builds + runs the Go server as a
# background process (dev-mode auth + replay worker pointed at committed
# cassettes), then lets Playwright start the Vite dev server and drives the
# browser-based end-to-end specs.
#
# ── Topology ─────────────────────────────────────────────────────────────────
#   [chromium] → [SPA dev server :5173] ──/api──▶ [Go server :8888] → Postgres
#                                                                    └▶ Temporal
#
# The Go server is started here (the uitests Playwright config does NOT start it
# — it only manages the SPA process). Playwright's webServer block starts
# `npm run dev` in ../webApp and reuseExistingServer=false in CI, so the SPA
# is always freshly started.
#
# ── Drafting mode ─────────────────────────────────────────────────────────────
# UITESTS_LIVE_DRAFTING=off — live co-author drafting specs are GATED in CI.
# After the agentic pivot (D-MSD-Δ / D-MPD-Δ), CoAuthorArtifactWorkflow always
# calls DispatchDesignJobActivity → constructionPipelineAccess. Without GitHub
# App env the pipeline RA is nil → nil pointer dereference. The cassette replay
# path (old workerAccess) no longer exists in the co-author workflow. The
# live-drafting uitests need the AgenticGitHub fake OR real GitHub App creds to
# run; they are gated until the workflow is updated.
#
# Only the pure-UI / navigation specs run in CI (server reachable, no drafting).
#
# ── Project state ─────────────────────────────────────────────────────────────
# The server uses the LOCAL git profile pointed at a FRESH EMPTY bare git repo
# at /tmp/uitests-projectstate.git (initialized below). We do NOT point it at
# the checked-out $GITHUB_WORKSPACE: that repo has a committed
# .aiarch/state/project.json for the dogfood "Archistrator" project (phase 2,
# construction). If the server uses it, CreateProject's permissive-resume path
# returns the construction-phase state for every new project the tests create,
# causing design-experience tests to navigate to /construction instead of
# /design/system and breaking the projects-catalog (emptyState/projectsGrid).
#
# GATED TESTS (run with UITESTS_LIVE_DRAFTING=off, live-drafting specs self-skip):
#   tests/design-experience.spec.ts  "co-author drafting" block
#   tests/architecture-views.spec.ts "live backend" block
# Reason: co-author workflow calls DispatchDesignJobActivity; constructionPipeline
# RA is nil without ARCHISTRATOR_CONSTRUCTION_REPO_OWNER → nil pointer dereference.

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'webApp/**'
      - 'uitests/**'
      - '.github/workflows/uitests.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - 'webApp/**'
      - 'uitests/**'
      - '.github/workflows/uitests.yml'

jobs:
  uitests:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: archistrator
          POSTGRES_PASSWORD: archistrator
          POSTGRES_DB: archistrator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U archistrator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Temporal CLI
        run: |
          curl -sSf https://temporal.download/cli.sh | sh
          echo "$HOME/.temporalio/bin" >> "$GITHUB_PATH"

      - name: Start Temporal dev server
        run: |
          temporal server start-dev \
            --namespace aiarch-test \
            --headless \
            --port 7233 \
            --log-level error &
          for i in $(seq 1 60); do
            if temporal operator cluster health --address 127.0.0.1:7233 >/dev/null 2>&1; then
              echo "Temporal ready"
              break
            fi
            sleep 1
          done
          temporal operator cluster health --address 127.0.0.1:7233

      - name: Build Go server binary
        working-directory: server
        run: GOWORK=off go build -o /tmp/archistrator-server ./cmd/server

      - name: Initialize fresh git repo for uitests project state
        # Use a FRESH EMPTY bare repo (not the checked-out workspace which has the
        # dogfood project.json at phase 2 / construction).  A bare repo with one
        # empty commit on main lets go-git's GitStore clone + push cleanly.
        # Mirrors how systemtests' StartLocalGitRepo seeds a bare repo.
        run: |
          git config --global user.email "uitests@aiarch.local"
          git config --global user.name "uitests"
          git init --bare --initial-branch=main /tmp/uitests-projectstate.git
          WORK=$(mktemp -d)
          git clone /tmp/uitests-projectstate.git "$WORK/seed"
          git -C "$WORK/seed" checkout -B main
          git -C "$WORK/seed" commit --allow-empty -m "seed"
          git -C "$WORK/seed" push origin main
          rm -rf "$WORK"

      - name: Start Go server (dev-mode, replay worker, fresh local git project state)
        run: |
          /tmp/archistrator-server &
          # Wait up to 60s for /healthz
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:8888/healthz >/dev/null 2>&1; then
              echo "Server ready"
              break
            fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8888/healthz
        env:
          ARCHISTRATOR_LISTEN_ADDR: ':8888'
          ARCHISTRATOR_POSTGRES_URL: postgres://archistrator:archistrator@localhost:5432/archistrator?sslmode=disable
          ARCHISTRATOR_TEMPORAL_HOSTPORT: localhost:7233
          ARCHISTRATOR_TEMPORAL_NAMESPACE: aiarch-test
          ARCHISTRATOR_AUTH_DEV_MODE: 'true'
          ARCHISTRATOR_DEV_SUBJECT: dev-architect
          # Replay worker — no Ollama/Anthropic key needed
          ARCHISTRATOR_WORKER_PROVIDER: replay
          ARCHISTRATOR_WORKER_REPLAY_DIR: ${{ github.workspace }}/uitests/testdata/cassettes
          ARCHISTRATOR_WORKER_REPLAY_MODE: strict
          # Local git project state: fresh empty bare repo (NOT the checked-out workspace)
          ARCHISTRATOR_PROJECT_STATE_GIT_LOCAL: 'true'
          ARCHISTRATOR_PROJECT_STATE_GIT_REPO_URL: 'file:///tmp/uitests-projectstate.git'

      - name: Install webApp dependencies
        working-directory: webApp
        run: npm ci

      - name: Install uitests dependencies
        working-directory: uitests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: uitests
        run: npx playwright install --with-deps chromium

      - name: Run UI tests
        working-directory: uitests
        env:
          CI: 'true'
          # off → live-drafting specs self-skip (see header for gating rationale)
          UITESTS_LIVE_DRAFTING: 'off'
          UITESTS_SPA_URL: 'http://localhost:5173'
        run: npm test

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: uitests/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: uitests/test-results/
          retention-days: 7
