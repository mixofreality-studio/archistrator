name: Server Checks

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-checks.yml'

jobs:
  check:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Configure private module access
        run: |
          git config --global url."https://x-access-token:${{ secrets.PLATFORM_READ_TOKEN }}@github.com/".insteadOf "https://github.com/"
        env:
          GOPRIVATE: github.com/davidmarne/*

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "Run 'gofmt -w .'"; exit 1; }

      - name: Go vet
        run: GOWORK=off GOPRIVATE=github.com/davidmarne/* go vet ./...

      - name: Build
        run: GOWORK=off GOPRIVATE=github.com/davidmarne/* go build ./...

      - name: Test (container-free)
        run: GOWORK=off GOPRIVATE=github.com/davidmarne/* make test-short
