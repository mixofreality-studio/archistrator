name: Server Checks

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-checks.yml'
  pull_request:
    branches: [main]
    paths:
      - 'server/**'
      - '.github/workflows/server-checks.yml'

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: server/go.sum

      - name: Check formatting
        run: test -z "$(gofmt -l .)" || { gofmt -l .; echo "Run 'gofmt -w .'"; exit 1; }

      - name: Go vet
        run: GOWORK=off go vet ./...

      - name: Build
        run: GOWORK=off go build ./...

      - name: Test (container-free)
        run: GOWORK=off make test-short
