# aiarch CONSTRUCTION workflow
# ============================
# Dispatched by archistrator-server constructionPipelineAccess (UC3) via
# workflow_dispatch when ARCHISTRATOR_CONSTRUCTION_DRYRUN=false.
#
# LOAD-BEARING CONTRACT — DO NOT CHANGE THESE ANCHORS:
#   1. workflow_dispatch input named EXACTLY `idempotency_token` (string,
#      required). framework-go-infrastructure-github DispatchInputKeyIdempotencyToken
#      = "idempotency_token". The RA stamps this input LAST and finds/dedups/
#      observes/cancels runs BY RUN NAME (aiarch-cp-<token>).
#   2. Top-level `run-name: aiarch-cp-${{ inputs.idempotency_token }}`.
#      RunNamePrefix="aiarch-cp-"; ListRunsByName matches on this prefix.
#      Wrong run-name = RA can never see its own dispatched run.
#   3. workflow_dispatch-triggerable on the dispatch ref (main).
#
# server-checks (run in working-directory: server):
#   gofmt -w . / GOWORK=off go vet ./... / GOWORK=off go build ./... /
#   GOWORK=off make test-short
name: aiarch-construct

# (2) Run-name is the idempotency anchor. EXACT prefix required.
run-name: aiarch-cp-${{ inputs.idempotency_token }}

on:
  workflow_dispatch:
    inputs:
      # (1) LOAD-BEARING — the dedup token the RA stamps into run-name.
      idempotency_token:
        description: "aiarch dedup token (RA-supplied; stamped into run-name)"
        required: true
        type: string
      # Activity id from the project network (e.g. "C-PE").
      activity_id:
        description: "construction activity id (e.g. C-PE)"
        required: true
        type: string
      # Component id matching a contract JSON under server/cmd/seed-contracts/data/.
      component_id:
        description: "component id — must match a file in server/cmd/seed-contracts/data/<component_id>.json"
        required: true
        type: string
      # Accepted-and-ignored. The Manager's dispatch adapter always sends `phase`
      # and `role` (they are load-bearing for the per-phase aiarch-phase.yml). This
      # single-shot construction workflow does not use them, but GitHub rejects the
      # WHOLE workflow_dispatch with 422 "Unexpected inputs" if they are undeclared,
      # so we declare them here as optional no-ops.
      phase:
        description: "App-A method phase (ignored by this single-shot workflow)"
        required: false
        type: string
      role:
        description: "assigned worker class (ignored by this single-shot workflow)"
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  # claude-code-action exchanges an OIDC token for its OAuth flow; without this the
  # action fails with "Could not fetch an OIDC token".
  id-token: write

# One in-flight construction run per dedup token — belt-and-braces alongside the
# RA's own run-name convergence.
concurrency:
  group: aiarch-cp-${{ inputs.idempotency_token }}
  cancel-in-progress: false

jobs:
  construct:
    runs-on: ubuntu-latest
    # Bound the run — claude must implement + open the PR within this window or the
    # job is killed (no silent multi-hour grinds). 12 min was observed cutting off
    # substantive components (e.g. billingGatewayAccess, ~900 LOC + Stripe + tests)
    # mid-implement before commit+PR; 25 gives runway to land the PR while still
    # bounding any runaway. Keep this >= the prompt's stated budget below.
    timeout-minutes: 25
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      # Single source of truth: the service contract lives in the project's head
      # state (.aiarch/state/project.json → .serviceContracts), NOT a parallel
      # per-file copy. Extract the one contract for this component to the repo root.
      - name: Extract service contract from project.json
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          jq --arg c "${{ inputs.component_id }}" '.serviceContracts[$c] // empty' \
            .aiarch/state/project.json > service-contract.json
          if [ ! -s service-contract.json ]; then
            echo "::error::no service contract for component '${{ inputs.component_id }}' in .aiarch/state/project.json"
            exit 1
          fi
          echo "Extracted contract for ${{ inputs.component_id }}:"
          cat service-contract.json

      - name: Implement component (claude-code-action)
        uses: anthropics/claude-code-action@v1
        with:
          # Org secret — provisioned ONCE by the founder on mixofreality-studio.
          # aiarch never mints or sees this token.
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Construction is ALWAYS dispatched by the archistrator-bot App (a Bot
          # actor); claude-code-action refuses bot-initiated runs unless allow-listed.
          allowed_bots: archistrator-bot
          # Emit the full agent transcript into the job log (default truncates), so a
          # run that stalls or fails is diagnosable without a rerun.
          show_full_output: true
          # Autonomous CI: the ephemeral runner is scoped to this one construction
          # task, so skip the interactive permission gates (founder-authorized) — claude
          # writes files, runs git/go/gh, and opens the PR without an approver.
          claude_args: "--dangerously-skip-permissions"
          # Thin prompt: NO construction logic lives here. It all lives in the `/construct`
          # Claude command (.claude/commands/construct.md), which references the
          # junior-developer agent + the-method-layers / the-method-service-contract skills and
          # targets .aiarch/state/project.json. The workflow just invokes the command with the
          # component + activity ids. Keep prompt logic in commands → agents → skills, not YAML.
          prompt: |
            /construct ${{ inputs.component_id }} ${{ inputs.activity_id }}
