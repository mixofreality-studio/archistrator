# golangci-lint v2 config for the aiarch server.
#
# gochecksumtype enforces exhaustiveness of switch statements over the generated
# sealed sum types — the //sumtype:decl interfaces cmd/modelgen emits. It is the
# bundled form of github.com/alecthomas/go-check-sumtype (also runnable standalone
# via `make sumtype-check`).
version: "2"

linters:
  # Baseline gate (shared across archistrator-platform, server, systemtests):
  #   default "standard" set = errcheck, govet, ineffassign, staticcheck, unused
  #   + gochecksumtype + gosec. Standard gofmt only (see formatters below).
  # Generated code (// Code generated ... DO NOT EDIT.) is auto-excluded by v2.
  default: standard
  enable:
    - gochecksumtype
    - gosec
  settings:
    gochecksumtype:
      # Treat a missing case as an error (the whole point of a sealed sum).
      default-signifies-exhaustive: false
  exclusions:
    rules:
      # gosec is a production-security linter. Test files legitimately use fake
      # credentials, loose file permissions, and testdata path reads.
      - path: "_test\\.go"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
