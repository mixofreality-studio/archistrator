# Local provisioning for the wire harness — Postgres + Ollama only. Temporal is
# NOT here: it runs as a local `temporal server start-dev` dev server
# (scripts/temporal-dev.sh) persisting to .temporal/aiarch-test.db with the web
# UI on :8233 — mirroring the server module's persistent-DB + `make temporal-ui`
# model and reusing the temporal CLI you already have (no fragile container).
#
# The harness imports none of this (R3); endpoints are passed to `go test` via
# the ARCHISTRATOR_* env (see Makefile).
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: archistrator
      POSTGRES_PASSWORD: archistrator
      POSTGRES_DB: archistrator
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archistrator"]
      interval: 5s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ollama:
