# Belt-and-suspenders to constitution/constitution_test.go: depguard bans
# importing the system-under-test and any mocking library from the black-box
# wire harness (the-method-testing §7 R3/R6). The constitution test is the
# toolchain-independent guarantee; this is the linter-level one CI also runs.
version: "2"

run:
  go: "1.25"

linters:
  # Baseline gate (shared across archistrator-platform, server, systemtests):
  #   default "standard" set = errcheck, govet, ineffassign, staticcheck, unused
  #   + gochecksumtype + gosec. Standard gofmt only (see formatters below).
  # Generated code (// Code generated ... DO NOT EDIT.) is auto-excluded by v2.
  # depguard below is the systemtests-specific wire-harness import ban.
  default: standard
  enable:
    - gochecksumtype
    - gosec
    - depguard
  settings:
    gochecksumtype:
      default-signifies-exhaustive: false
    depguard:
      rules:
        harness:
          files:
            - "$all"
          deny:
            - pkg: github.com/mixofreality-studio/archistrator/server
              desc: "black-box wire harness must not import the system under test (§7 R1/R3) — drive it over the wire"
            - pkg: github.com/stretchr/testify/mock
              desc: "a wire harness substitutes nothing (§7 R3)"
            - pkg: go.uber.org/mock
              desc: "a wire harness substitutes nothing (§7 R3)"
            - pkg: github.com/golang/mock
              desc: "a wire harness substitutes nothing (§7 R3)"
  exclusions:
    rules:
      # The entire module is a black-box test harness. gosec is a
      # production-security linter; the harness legitimately spawns git, reads
      # testdata, writes scratch files, and embeds fake tokens.
      - path: "internal/harness/"
        linters:
          - gosec
      - path: "_test\\.go"
        linters:
          - gosec

formatters:
  enable:
    - gofmt
